server:
  port: 8183
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: file-convert-service
  h2:
    console:
      enabled: false
  redis:
    host: 127.0.0.1
    port: 6379
    timeout: 10000ms             # 命令超时（改为10秒，支持 Redis Streams block 操作）
    lettuce:
      pool:
        max-active: 20
        max-idle: 8
        min-idle: 0
        max-wait: -1ms
  web:
    resources:
      static-locations: classpath:/static/
      cache-period: 0
  cloud:
    openfeign:
      client-config:
        default:
          connect-timeout: 5000
          read-timeout: 10000

mq:
  engine: ${MQ_ENGINE:redis} # 优先使用环境变量 MQ_ENGINE，未设置时默认 redis
  redis:
    stream:
      max-length: 50000  # Stream 最大长度（使用 MAXLEN ~ 策略防止内存无限膨胀）
      trim-length: 10000  # 定期清理保留长度（每小时执行，保留最近 N 条已确认消息）

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: file-convert-producer
    send-message-timeout: 3000
    retry-times-when-send-failed: 2
    retry-times-when-send-async-failed: 2
    max-message-size: 4194304
  consumer:
    group: file-convert-consumer

# LibreOffice文档转换器配置
libreoffice:
  # CLI 模式配置（传统命令行方式）
  command:
    path: /usr/local/bin/soffice  # LibreOffice实际安装路径
  temp:
    dir: /var/app/fileview-backend/fileTemp/libreoffice  # 临时目录
    cleanup:
      max-age-hours: 1  # 临时文件最大保留时间（小时），超过此时间的 instance 目录将被清理
      cron: "0 */15 * * * ?"  # 定时清理任务（2C4G优化：每15分钟清理一次，原每小时）
  conversion:
    timeout: 120  # 转换超时时间（秒）
  headless: true  # 无头模式
  invisible: true  # 隐藏模式
  enable: true  # 是否启用LibreOffice转换器
  # 加密文档黑名单（这些格式带密码时不使用 LibreOffice，避免崩溃）
  encrypted-blacklist: "xls,ppt,dps,dpt"
  # JODConverter 模式配置（支持密码文档）
  jod:
    enabled: true  # 启用 JODConverter 模式
    office-home: /usr/share/libreoffice  # LibreOffice 安装目录
    port-numbers: 2002,2003  # 监听端口（支持多端口连接池）
    max-tasks-per-process: 50  # 每个进程最大任务数（2C4G优化：原100降为50）
    task-execution-timeout: 180000  # 任务执行超时（2C4G优化：原300秒降为180秒）
    task-queue-timeout: 30000  # 任务队列超时（毫秒）
    process-timeout: 120000  # 进程启动超时（毫秒）
    process-retry-interval: 250  # 进程重试间隔（毫秒）
    max-process-count: 1  # 最大进程数

# 转换引擎全局配置
convert:
  # 消费者配置
  consumer:
    # 消息去重有效期（毫秒，默认5分钟）
    message-expire-time: 300000
    # 转换超时时间（毫秒，默认120秒）
    conversion-timeout: 120000
    # 转换线程池配置（用于控制并发转换任务数，避免资源耗尽）
    # 2C4G环境优化：降低线程数减少内存占用
    conversion-core-pool-size: 2      # 核心线程数（原4降为2）
    conversion-max-pool-size: 4       # 最大线程数（原8降为4）
    conversion-queue-capacity: 100    # 等待队列长度（原200降为100）
  # 引擎配置
  engine:
    smart-selection:
      enabled: false  # 默认禁用，保持原有配置优先级行为
    # 健康检查配置
    health:
      check:
        enabled: true  # 是否启用后台健康检查服务
        cron: "0/30 * * * * ?"  # 健康检查定时任务（每30秒执行一次）
        ttl: 60  # 引擎状态在 Redis 中的缓存时间（秒，默认60秒）
        lock-timeout: 10  # 分布式锁超时时间（秒，默认10秒）

# Word转换引擎配置
word:
  convert:
    engine:
      priority: libreoffice
      fallback: true  # 是否启用故障转移
    file:
      size:
        threshold: 10485760  # 10MB文件大小阈值 
    libreoffice:
      enable: true  # 启用LibreOffice转换器
      
# Excel转换引擎配置
excel:
  convert:
    engine:
      priority: libreoffice # Excel转换引擎优先级
      fallback: true  # 是否启用故障转移
    file:
      size:
        threshold: 50485760  # 50MB文件大小阈值（Excel文件通常较大）
    libreoffice:
      enable: true  # 启用LibreOffice Excel转换

# PPT转换引擎配置
ppt:
  convert:
    engine:
      priority: libreoffice # PPT转换引擎优先级
      fallback: true  # 是否启用故障转移
    file:
      size:
        threshold: 100485760  # 100MB文件大小阈值（PPT文件可能包含大量媒体）
    libreoffice:
      enable: true  # 启用LibreOffice PPT转换

# Visio转换引擎配置
visio:
  convert:
    engine:
      priority: libreoffice  # Visio转换引擎优先级
      fallback: true  # 是否启用故障转移
    file:
      size:
        threshold: 50485760  # 50MB文件大小阈值
    libreoffice:
      enable: true  # 启用LibreOffice Visio转换

# CAD转换配置（使用 CAD2X 转换器）
cad:
  convert:
    cad2x:
      enable: true  # 是否启用CAD2X转换器

# CAD2X转换器配置
cad2x:
  converter:
    # 可执行文件路径（留空则自动检测：Linux优先使用 linux_x64/linux_arm64, Windows使用 win_x64）
    # 建议在生产环境中明确指定，例如：/usr/local/bin/cad2x
    path: 
  temp:
    # 临时目录（留空则使用系统临时目录）
    dir: /var/app/fileview-backend/fileTemp/cad2x
  conversion:
    timeout: 120  # 转换超时时间（秒）
  options:
    # 以下为 cad2x 渲染选项，可根据需要调整
    center: true  # 是否居中对齐（-ac）
    encoding:  # 文本编码（-e），留空使用默认
    font:  # 字体名称（-f），留空使用默认
    fontDirs:  # 字体目录（-l），多个目录用冒号分隔
    page: 2970x2100  # 页面尺寸（-p），单位：1/10mm
    margins: 2.0,2.0,2.0,2.0  # 页边距（-m），顺序：左,上,右,下，单位：mm

# OFD转换策略配置
ofd:
  convert:
    # 默认转换目标格式
    default-target-format: pdf
    # 并行转换配置
    parallel:
      # 启用并行转换的最小页面数
      min-pages: 3
      # 最大并行线程数
      max-threads: 4
  # 字体配置
  font:
    # 字体目录扫描路径（可选，留空则使用系统默认字体目录）
    scan-paths:
      # - "/usr/share/fonts"
      # - "/usr/local/share/fonts"

# 文件存储配置
storage:
# 预览文件存放目录（可配置）
  convert-target-dir: /var/app/fileview-backend/fileTemp/target
