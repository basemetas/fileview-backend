server:
  port: 0

spring:
  application:
    name: file-convert-service-test
  redis:
    host: localhost
    port: 6379
    database: 0
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.apache.rocketmq.spring.autoconfigure.RocketMQAutoConfiguration

# 为测试提供基本的RocketMQ配置以避免验证错误
rocketmq:
  name-server: localhost:9876
  producer:
    group: file-convert-producer-test

management:
  endpoints:
    web:
      exposure:
        include: health